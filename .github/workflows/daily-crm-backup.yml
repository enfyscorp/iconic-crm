name: Daily CRM Backup

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 11:30 PM India time.
    # GitHub uses UTC time, so 11:30 PM IST = 6:00 PM UTC.
    - cron: "0 18 * * *"

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl ca-certificates gnupg lsb-release
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Create CRM backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          mkdir -p backups
          BACKUP_FILE="backups/crm_state_store_$(date -u +'%Y-%m-%d_%H-%M-%S_UTC').sql"
          /usr/lib/postgresql/17/bin/pg_dump "$SUPABASE_DB_URL" \
            --schema=public \
            --table=public.crm_state_store \
            --no-owner \
            --no-privileges \
            --file="$BACKUP_FILE"
          echo "Created backup: $BACKUP_FILE"

      - name: Upload backup file
        uses: actions/upload-artifact@v4
        with:
          name: crm-database-backup
          path: backups/*.sql
          retention-days: 30
